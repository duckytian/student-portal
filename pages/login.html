<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Cavite State University Tanza Campus</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components/login.css" />

</head>
<body>
  <div class="login-card">
    <!-- LEFT PANEL - GREEN GLASS -->
    <div class="card-left">
      <h1 class="welcome-title">Welcome!</h1>
      <div class="welcome-messages">
  <p class="welcome-text">Access Your Academic Records</p>
  <p class="welcome-text">Connect with Your Professors</p>
</div>
      <p class="university-motto">Excellence, Integrity, Service</p>
    </div>

    <!-- RIGHT PANEL - WHITE GLASS -->
    <div class="card-right">
      <div class="logo-wrapper">
         <img src="../images/logo.png" alt="CvSU Logo" style="width: 100%; height: 100%; object-fit: cover;">
      </div>
      <div class="school-name">CAVITE STATE UNIVERSITY – TANZA CAMPUS</div>
      <div class="school-subtitle">Log in to Student Portal</div>

      <div class="form-group">
        <label for="student-no">Student Number</label>
        <input type="text" id="student-no" placeholder="20XXXXXXXX" class="form-input" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="pw-field">
          <input type="password" id="password" placeholder="Enter your password" class="form-input" />
          <span class="eye-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>
        <a href="../pages/components/activation.html" class="link-account">Account Activation</a>
      </div>
      <button class="btn-login">LOGIN</button>

<script>
  document.querySelector('.btn-login').addEventListener('click', function(e) {
    e.preventDefault(); 
    window.location.href = "../index.html"; 
  });
</script>

      
    </div>
  </div>
</body>
</html>
