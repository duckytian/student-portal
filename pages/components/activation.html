<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Account Activation | CvSU Tanza</title>
  <link rel="stylesheet" href="style.css">
</head>
<style>
  :root {
  --green-dark: #1a4a2e;
  --green-mid: #2d6a44;
  --green-light: #3d8b5e;
  --green-soft: #5cb885;
  --green-glass: rgba(26, 74, 46, 0.65);
  --white-glass: rgba(255, 255, 255, 0.92);
  --white: #ffffff;
  --off-white: #f4f7f5;
  --text-dark: #1d392a;
  --text-soft: #4e6e5c;
  --gold: #d4a017;
  --shadow-card: 0 32px 80px rgba(0, 0, 0, 0.45);
  --font-serif: 'Playfair Display', serif;
  --font-sans: 'DM Sans', sans-serif;
  --radius-card: 28px;
}

body {
  font-family: var(--font-sans);
  background-color: var(--off-white);
  display: flex;
   background: url('../../images/campus.png') center center / cover no-repeat fixed;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.activation-container {
  background-color: var(--green-glass);
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.activation-card {
  background-color: var(--white-glass);
  padding: 40px;
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  max-width: 700px;
  width: 90%;
}

.activation-header h1 {
  font-family: var(--font-serif);
  color: var(--green-dark);
  margin-bottom: 5px;
}

.activation-header p {
  color: var(--text-soft);
  font-size: 0.95rem;
  margin-bottom: 25px;
}

form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.form-row {
  display: flex;
  gap: 20px;
}

.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
}

label {
  font-weight: 600;
  color: var(--text-dark);
  margin-bottom: 5px;
}

input, select {
  padding: 12px;
  border: 1px solid var(--green-light);
  border-radius: 8px;
  font-size: 0.95rem;
  outline: none;
}

input:focus, select:focus {
  border-color: var(--green-soft);
  box-shadow: 0 0 0 3px rgba(92, 184, 133, 0.3);
}

.full-width {
  width: 100%;
}

.form-buttons {
  display: flex;
  justify-content: flex-end;
  gap: 15px;
  margin-top: 10px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

button.cancel {
  background-color: var(--off-white);
  color: var(--text-soft);
  border: 1px solid var(--green-light);
}

button.cancel:hover {
  background-color: #e0e0e0;
}

button.activate {
  background-color: var(--green-mid);
  color: var(--white);
}

button.activate:hover {
  background-color: var(--green-light);
}

/* Responsive */
@media (max-width: 600px) {
  .form-row {
    flex-direction: column;
  }
}
</style>
<body>
  <section class="activation-container">
    <div class="activation-card">
      <div class="activation-header">
        <h1>Student Account Activation</h1>
        <p>Verify your enrollment to activate your portal account.</p>
      </div>

      <form>
        <div class="form-row">
          <div class="form-group">
            <label for="student-number">Student Number</label>
            <input type="text" id="student-number" placeholder="20XXXXXXXX" required>
          </div>

          <div class="form-group">
            <label for="program">Program / Course</label>
            <select id="program" required>
              <option value="">Select your program...</option>
              <option value="BSIT">BS Information Technology</option>
              <option value="BSCS">BS Computer Science</option>
              <option value="BSE">BS Secondary Education</option>
              <option value="BEED">BS Elementary Education</option>
              <option value="BSBA">BS Business Administration</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" placeholder="e.g., Juan" required>
          </div>

          <div class="form-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" placeholder="e.g., Dela Cruz" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="middle-name">Middle Name</label>
            <input type="text" id="middle-name" placeholder="e.g., Reyes (Leave blank if none)">
          </div>

          <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
          </div>
        </div>

        <div class="form-group full-width">
          <label for="email">CvSU Email Address</label>
          <input type="email" id="email" placeholder="e.g., juan.delacruz@cvsu.edu.ph" required>
        </div>

        <div class="form-buttons">
          <button type="button" class="cancel" onclick="window.location.href='../login.html'">Cancel</button>
          <button type="submit" class="activate" onclick="window.location.href='./successfully.html'">Activate Account</button>
        </div>
      </form>
    </div>
  </section>
</body>
</html>
