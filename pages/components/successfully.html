<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Activated – CvSU Tanza</title>
  <style>
body {
  font-family: Arial, sans-serif;
  background: url('../../images/campus.png') center center / cover no-repeat fixed;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(26, 74, 46, 0.7); 
  z-index: 0;
}

.success-container {
  position: relative;
  z-index: 1;
  background: #fff;
  padding: 30px 35px;
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  width: 420px;
  max-width: 90%;
  text-align: center;
}

.success-container h2 {
  color: #1a4a2e;
  margin-bottom: 8px;
}

.success-container p {
  font-size: 14px;
  color: #555;
  margin-bottom: 20px;
}

.success-box h3 {
  color: #2d6a44;
  margin-bottom: 10px;
}

.success-box p {
  font-size: 13px;
  color: #444;
  margin-bottom: 20px;
}

.btn-login {
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  background: linear-gradient(135deg, #2d6a44, #1a4a2e);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(26,74,46,0.4);
}

  </style>
</head>
<body>
  <div class="success-container">
    <h2>Student Account Activation</h2>
    <p>Verify your enrollment to activate your portal account.</p>

    <div class="success-box">
      <h3>✓ Account Successfully Activated</h3>
      <p>Your student profile is verified. The system secures your account and sends a temporary password directly to your official CvSU email address. Please check your inbox.</p>

      <button class="btn-login" onclick="window.location.href='../login.html'"> Go to Login Page</button>
    </div>
  </div>
</body>
</html>
